<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ประวัติ - Shora Hub</title>
    <meta name="description" content="Order, topup, and tool usage history for Shora Hub members." />
    <link rel="icon" type="image/png" href="/assets/site-logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="history">
    <header class="app-header">
      <a class="brand" href="/">
        <span class="brand-mark"><img src="/assets/site-logo.png" alt="" /></span>
        <span>Shora Hub</span>
      </a>
      <a class="login-button" id="loginButton" data-provider="discord" href="/auth/discord">เข้าสู่ระบบ</a>
    </header>

    <main class="app-main history-main">
      <p class="page-kicker reveal">ประวัติ</p>

      <section class="history-panel reveal">
        <div class="history-title">
          <span aria-hidden="true">↺</span>
          <h1>ประวัติ</h1>
        </div>

        <div class="member-lock history-lock" id="historyLock" hidden>
          <span class="lock-icon" aria-hidden="true">□</span>
          <h2>ประวัติสำหรับสมาชิก</h2>
          <p>เข้าสู่ระบบด้วย Discord เพื่อดูประวัติคำสั่งซื้อ เติมเงิน และการใช้เครื่องมือ</p>
          <a class="login-button lock-login" href="/auth/discord" data-provider="discord">เข้าสู่ระบบด้วย Discord</a>
        </div>

        <div class="history-content" id="historyContent" hidden>
          <div class="history-tabs" role="tablist" aria-label="History tabs">
            <button class="active" type="button" data-history-tab="orders">ประวัติการสั่งซื้อ</button>
            <button type="button" data-history-tab="topups">ประวัติการเติมเงิน</button>
            <button type="button" data-history-tab="tools">ประวัติการใช้เครื่องมือ</button>
          </div>

          <input class="history-search" id="historySearch" type="search" placeholder="ค้นหาสินค้า" autocomplete="off" />

          <div class="history-table-wrap">
            <table class="history-table">
              <thead id="historyTableHead"></thead>
              <tbody id="historyTableBody">
                <tr><td class="empty-state">กำลังโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="history-pager">
            <button type="button" aria-label="Previous page" disabled>‹</button>
            <span>1</span>
            <button type="button" aria-label="Next page" disabled>›</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <a href="/" data-nav="home"><span>⌂</span>หน้าหลัก</a>
      <a href="/category" data-nav="category"><span>□</span>สินค้า</a>
      <a href="/tools" data-nav="tools"><span>⌘</span>เครื่องมือ</a>
      <a href="/topup" data-nav="topup"><span>▤</span>เติมเงิน</a>
      <a href="/guide" data-nav="guide"><span>□</span>คู่มือการใช้งาน</a>
      <a href="/contact" data-nav="contact"><span>⌁</span>ติดต่อ</a>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/script.js"></script>
  </body>
</html>
